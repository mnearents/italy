<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>POI Explorer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <h1>POI Explorer</h1>
    <div class="header-actions">
      <button id="btn-toggle-view" class="header-btn" title="Toggle view">
        <span id="view-icon">&#9776;</span>
      </button>
      <button id="btn-settings" class="header-btn" title="Settings">&#9881;</button>
    </div>
  </header>

  <!-- Map View -->
  <div id="map-view" class="view active">
    <div id="map"></div>
    <button id="btn-add-poi" class="fab" title="Add point of interest">+</button>
  </div>

  <!-- List View -->
  <div id="list-view" class="view">
    <div id="poi-list" class="poi-list"></div>
    <button id="btn-add-poi-list" class="fab" title="Add point of interest">+</button>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" data-close="settings-modal">&times;</button>
      </div>
      <div class="modal-body">
        <label for="base-address">Base Location</label>
        <div class="input-row">
          <input type="text" id="base-address" placeholder="Enter address or place name">
          <button id="btn-geocode-base" class="btn-primary">Search</button>
        </div>
        <div id="base-coords-display" class="coords-display"></div>
        <div id="base-search-results" class="search-results"></div>
        <button id="btn-use-gps" class="btn-secondary full-width">Use Current Location</button>
        <hr class="settings-divider">
        <button id="btn-reset-data" class="btn-danger full-width">Reset All Data</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit POI Modal -->
  <div id="poi-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="poi-modal-title">Add Point of Interest</h2>
        <button class="modal-close" data-close="poi-modal">&times;</button>
      </div>
      <div class="modal-body">
        <label for="poi-name">Name</label>
        <input type="text" id="poi-name" placeholder="e.g. Colosseum">

        <label for="poi-description">Description</label>
        <textarea id="poi-description" rows="3" placeholder="e.g. Ancient Roman amphitheater"></textarea>

        <label for="poi-address">Location</label>
        <div class="input-row">
          <input type="text" id="poi-address" placeholder="Enter address or place name">
          <button id="btn-geocode-poi" class="btn-primary">Search</button>
        </div>
        <div id="poi-coords-display" class="coords-display"></div>
        <div id="poi-search-results" class="search-results"></div>

        <input type="hidden" id="poi-lat">
        <input type="hidden" id="poi-lng">
        <input type="hidden" id="poi-id">
        <input type="hidden" id="poi-category" value="sight">

        <label>Category</label>
        <div class="category-selector">
          <button type="button" class="category-option category-option--active" data-category="sight">
            <span class="category-option-icon">&#x1F441;</span> Sight
          </button>
          <button type="button" class="category-option" data-category="food">
            <span class="category-option-icon">&#x1F37D;</span> Food
          </button>
          <button type="button" class="category-option" data-category="shopping">
            <span class="category-option-icon">&#x1F6D2;</span> Shopping
          </button>
        </div>

        <label for="poi-image-url">Image</label>
        <div class="input-row">
          <input type="text" id="poi-image-url" placeholder="Image URL (auto-fetched or paste)">
          <button type="button" id="btn-fetch-image" class="btn-secondary">Fetch</button>
        </div>
        <div id="poi-image-preview" class="image-preview" style="display:none;"></div>

        <label class="toggle-row" id="visited-toggle-row" style="display:none;">
          <span class="toggle-label">Visited</span>
          <input type="checkbox" id="poi-visited">
          <span class="toggle-switch"></span>
        </label>

        <div class="modal-actions">
          <button id="btn-delete-poi" class="btn-danger" style="display:none;">Delete</button>
          <button id="btn-save-poi" class="btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Welcome/Setup Modal -->
  <div id="welcome-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Welcome!</h2>
      </div>
      <div class="modal-body">
        <p>Set your base location to get started. This is used to calculate distances and directions to your points of interest.</p>
        <label for="welcome-address">Base Location</label>
        <div class="input-row">
          <input type="text" id="welcome-address" placeholder="Enter address or place name">
          <button id="btn-geocode-welcome" class="btn-primary">Search</button>
        </div>
        <div id="welcome-coords-display" class="coords-display"></div>
        <div id="welcome-search-results" class="search-results"></div>
        <button id="btn-use-gps-welcome" class="btn-secondary full-width">Use Current Location</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
